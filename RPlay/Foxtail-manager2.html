<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영지 관리 대장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f2e8c9;
    --parchment-dark: #e6d5a8;
    --parchment-shadow: #c9a96e;
    --ink: #2c1a0e;
    --ink-faded: #5c3d1e;
    --ink-light: #8b5e3c;
    --red-ink: #8b1a1a;
    --gold: #c8960c;
    --gold-light: #f0c040;
    --border: #9b7040;
    --border-dark: #6b4a20;
    --shadow: rgba(44,26,14,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a0e06;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(100,60,20,0.05) 2px, rgba(100,60,20,0.05) 4px);
    min-height: 100vh;
    font-family: 'Noto Serif KR', serif;
    color: var(--ink);
    padding: 24px 16px;
  }

  /* ── 상단 헤더 ── */
  .ledger {
    max-width: 960px;
    margin: 0 auto;
    background: var(--parchment);
    border: 3px solid var(--border-dark);
    box-shadow: 0 0 0 6px var(--border), 0 0 0 8px var(--border-dark), 0 20px 60px rgba(0,0,0,0.7);
    position: relative;
    background-image:
      url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='400' height='400' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E"),
      linear-gradient(160deg, #f7efd8 0%, #f2e8c9 40%, #eadb9f 100%);
  }

  .ledger::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid var(--parchment-shadow);
    pointer-events: none;
    z-index: 1;
  }

  /* ── 타이틀 영역 ── */
  .title-block {
    text-align: center;
    padding: 32px 40px 20px;
    border-bottom: 2px solid var(--border);
    position: relative;
  }

  .title-block::after {
    content: '❧';
    display: block;
    color: var(--gold);
    font-size: 22px;
    margin-top: 8px;
  }

  .title-label {
    font-family: 'IM Fell English', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--ink-light);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .domain-title {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 48px;
    color: var(--ink);
    line-height: 1;
    cursor: pointer;
    transition: color 0.2s;
  }

  .domain-title:hover { color: var(--red-ink); }

  .domain-title[contenteditable="true"] {
    outline: none;
    border-bottom: 2px dashed var(--gold);
  }

  .header-meta {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--ink-faded);
  }

  .meta-item label {
    font-style: italic;
    color: var(--ink-light);
  }

  .meta-item input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--parchment-shadow);
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--ink);
    width: 100px;
    text-align: center;
    outline: none;
  }

  /* ── 탭 메뉴 ── */
  .tabs {
    display: flex;
    border-bottom: 2px solid var(--border);
    background: rgba(139,94,60,0.08);
  }

  .tab-btn {
    flex: 1;
    padding: 12px 8px;
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .tab-btn:last-child { border-right: none; }

  .tab-btn:hover { background: rgba(200,150,12,0.1); color: var(--ink); }

  .tab-btn.active {
    background: var(--parchment);
    color: var(--ink);
    font-weight: 700;
    box-shadow: inset 0 -2px 0 var(--gold);
  }

  /* ── 탭 콘텐츠 ── */
  .tab-content { display: none; padding: 20px 24px; }
  .tab-content.active { display: block; }

  /* ── 섹션 제목 ── */
  .section-title {
    font-family: 'IM Fell English', serif;
    font-size: 18px;
    color: var(--red-ink);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::before, .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--parchment-shadow));
  }

  .section-title::before {
    background: linear-gradient(90deg, var(--parchment-shadow), transparent);
  }

  /* ── 자원 그리드 ── */
  .resource-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .resource-card {
    background: rgba(139,94,60,0.06);
    border: 1px solid var(--border);
    padding: 12px;
    text-align: center;
    position: relative;
  }

  .resource-card .res-icon { font-size: 22px; display: block; margin-bottom: 4px; }

  .resource-card .res-name {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-light);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .resource-card .res-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    width: 100%;
    background: transparent;
    border: none;
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    outline: none;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
  }

  .resource-card .res-value:focus { border-color: var(--gold); }

  .resource-card .res-unit {
    font-size: 10px;
    color: var(--ink-light);
    display: block;
    margin-top: 2px;
  }

  .resource-card .del-btn {
    position: absolute;
    top: 4px; right: 4px;
    background: none;
    border: none;
    color: var(--parchment-shadow);
    cursor: pointer;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .resource-card:hover .del-btn { opacity: 1; }

  /* ── 추가 버튼 ── */
  .add-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    background: none;
    border: 1px solid var(--border);
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    color: var(--ink-faded);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .add-btn:hover {
    background: rgba(200,150,12,0.1);
    border-color: var(--gold);
    color: var(--ink);
  }

  /* ── 재정 요약 ── */
  .finance-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .finance-box {
    border: 1px solid var(--border);
    padding: 16px;
    background: rgba(139,94,60,0.05);
  }

  .finance-box.debt { border-color: var(--red-ink); }

  .finance-box label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-light);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .finance-box .big-num {
    font-size: 28px;
    font-weight: 700;
    width: 100%;
    background: transparent;
    border: none;
    font-family: 'Noto Serif KR', serif;
    outline: none;
    border-bottom: 1px dashed var(--parchment-shadow);
  }

  .finance-box.debt .big-num { color: var(--red-ink); }

  /* ── 테이블 공통 ── */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 12px;
  }

  .data-table th {
    background: rgba(139,94,60,0.12);
    border: 1px solid var(--border);
    padding: 8px 10px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-faded);
    text-transform: uppercase;
    font-weight: 600;
    text-align: left;
  }

  .data-table td {
    border: 1px solid var(--parchment-shadow);
    padding: 6px 8px;
    vertical-align: top;
  }

  .data-table td[contenteditable="true"] {
    outline: none;
    cursor: text;
  }

  .data-table td[contenteditable="true"]:focus {
    background: rgba(200,150,12,0.08);
  }

  .data-table tr:hover td { background: rgba(200,150,12,0.04); }

  .table-del {
    background: none;
    border: none;
    color: var(--parchment-shadow);
    cursor: pointer;
    font-size: 14px;
  }

  .table-del:hover { color: var(--red-ink); }

  /* ── 일지 ── */
  .log-entry {
    border: 1px solid var(--border);
    margin-bottom: 16px;
    position: relative;
    background: rgba(255,255,255,0.15);
  }

  .log-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(139,94,60,0.1);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .log-date-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--parchment-shadow);
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--ink);
    width: 120px;
    outline: none;
    font-weight: 600;
  }

  .log-tag {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--ink-light);
    font-style: italic;
  }

  .log-del {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--parchment-shadow);
    cursor: pointer;
    font-size: 16px;
  }

  .log-del:hover { color: var(--red-ink); }

  .log-body {
    padding: 14px;
  }

  .log-notes {
    width: 100%;
    min-height: 80px;
    background: transparent;
    border: none;
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--ink);
    resize: vertical;
    outline: none;
    line-height: 1.8;
  }

  /* ── 하단 버튼 바 ── */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px;
    border-top: 2px solid var(--border);
    background: rgba(139,94,60,0.06);
    flex-wrap: wrap;
    gap: 10px;
  }

  .save-status {
    font-size: 11px;
    color: var(--ink-light);
    font-style: italic;
  }

  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

  .action-btn {
    padding: 9px 20px;
    border: 1px solid var(--border-dark);
    background: var(--ink);
    color: var(--parchment);
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .action-btn:hover {
    background: var(--red-ink);
    border-color: var(--red-ink);
  }

  .action-btn.secondary {
    background: transparent;
    color: var(--ink);
  }

  .action-btn.secondary:hover {
    background: rgba(139,94,60,0.15);
    color: var(--ink);
  }

  /* ── 모달 ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--parchment);
    border: 2px solid var(--border-dark);
    box-shadow: 0 0 0 4px var(--border), 0 20px 60px rgba(0,0,0,0.5);
    padding: 28px;
    width: 340px;
    max-width: 90vw;
  }

  .modal h3 {
    font-family: 'IM Fell English', serif;
    font-size: 18px;
    color: var(--red-ink);
    margin-bottom: 16px;
  }

  .modal label {
    display: block;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--ink-light);
    margin-bottom: 4px;
    margin-top: 10px;
    text-transform: uppercase;
  }

  .modal input, .modal select {
    width: 100%;
    background: rgba(255,255,255,0.4);
    border: 1px solid var(--border);
    padding: 7px 10px;
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
  }

  .modal-btns {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  /* ── 현황 대시보드 ── */
  .dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
    gap: 14px;
  }

  .dash-panel {
    border: 1px solid var(--border);
    background: rgba(139,94,60,0.04);
    overflow: hidden;
  }

  .dash-panel.full-width { grid-column: 1 / -1; }
  .dash-panel.finance-panel { grid-column: 1 / -1; }

  .dash-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: rgba(139,94,60,0.10);
    border-bottom: 1px solid var(--border);
    font-family: 'IM Fell English', serif;
    font-size: 13px;
    color: var(--red-ink);
    letter-spacing: 1px;
  }

  .dash-panel-header .panel-icon { font-size: 14px; margin-right: 6px; }

  .dash-panel-body { padding: 12px 14px; }

  /* 재정 가로 4칸 */
  .finance-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .fin-cell {
    text-align: center;
    padding: 10px 6px;
    border: 1px solid var(--parchment-shadow);
    background: rgba(255,255,255,0.15);
  }

  .fin-cell.red { border-color: var(--red-ink); }
  .fin-cell.green { border-color: #4a7a4a; }

  .fin-cell .fc-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--ink-light);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .fin-cell .fc-val {
    font-size: 20px;
    font-weight: 700;
    background: transparent;
    border: none;
    width: 100%;
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    outline: none;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
    color: var(--ink);
  }

  .fin-cell.red .fc-val { color: var(--red-ink); }
  .fin-cell.green .fc-val { color: #2e6b2e; }
  .fin-cell .fc-val:focus { border-color: var(--gold); }

  /* 빌딩 카드 미니 */
  .mini-building-list { display: flex; flex-direction: column; gap: 5px; }

  .mini-building {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border: 1px solid var(--parchment-shadow);
    font-size: 12px;
  }

  .mini-building .mb-name { flex: 1; font-weight: 600; color: var(--ink); }
  .mini-building .mb-level { font-size: 10px; color: var(--ink-light); }
  .mini-building .mb-status {
    font-size: 10px;
    padding: 2px 6px;
    border: 1px solid currentColor;
    border-radius: 0;
  }

  .status-normal { color: #3a7a3a; }
  .status-construction { color: var(--gold); }
  .status-damaged { color: var(--red-ink); }
  .status-other { color: var(--ink-light); }

  /* NPC 관계도 미니 */
  .mini-npc-list { display: flex; flex-direction: column; gap: 5px; }

  .mini-npc {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border: 1px solid var(--parchment-shadow);
    font-size: 12px;
  }

  .mini-npc .mn-icon {
    width: 26px; height: 26px;
    background: rgba(139,94,60,0.12);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }

  .mini-npc .mn-name { font-weight: 600; flex: 1; }
  .mini-npc .mn-role { font-size: 10px; color: var(--ink-light); }
  .mini-npc .mn-note { font-size: 10px; color: var(--ink-faded); font-style: italic; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* 퀘스트 미니 */
  .mini-quest-list { display: flex; flex-direction: column; gap: 5px; }

  .mini-quest {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 8px;
    border: 1px solid var(--parchment-shadow);
    font-size: 12px;
  }

  .mini-quest .mq-badge {
    font-size: 9px;
    padding: 2px 5px;
    border: 1px solid currentColor;
    white-space: nowrap;
    margin-top: 1px;
  }

  .mq-진행중 { color: var(--gold); }
  .mq-완료 { color: #3a7a3a; }
  .mq-대기 { color: var(--ink-light); }
  .mq-실패 { color: var(--red-ink); }

  .mini-quest .mq-title { font-weight: 600; flex: 1; }
  .mini-quest .mq-date { font-size: 10px; color: var(--ink-light); white-space: nowrap; }

  /* 자원 미니 가로 스크롤 */
  .mini-resource-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .mini-res {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    background: rgba(139,94,60,0.06);
    font-size: 12px;
  }

  .mini-res .mr-icon { font-size: 16px; }
  .mini-res .mr-name { color: var(--ink-light); font-size: 10px; }
  .mini-res .mr-val { font-weight: 700; color: var(--ink); }

  /* ── 특이사항 강조 ── */
  .special-note-wrap {
    display: flex;
    align-items: stretch;
    margin: 6px 0;
    border-left: 3px solid var(--gold);
    background: rgba(200,150,12,0.08);
  }

  .special-note {
    flex: 1;
    padding: 7px 10px;
    font-size: 13px;
    color: var(--ink-faded);
    outline: none;
    min-height: 32px;
  }

  .special-note-del {
    background: none;
    border: none;
    border-left: 1px solid rgba(200,150,12,0.3);
    color: var(--parchment-shadow);
    cursor: pointer;
    padding: 0 10px;
    font-size: 13px;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
  }

  .special-note-del:hover {
    color: var(--red-ink);
    background: rgba(139,26,26,0.07);
  }

  .npc-portrait {
    width: 32px; height: 32px;
    background: rgba(139,94,60,0.15);
    border: 1px solid var(--border);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--parchment-dark); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  @media (max-width: 600px) {
    .finance-row { grid-template-columns: 1fr; }
    .finance-4 { grid-template-columns: 1fr 1fr; }
    .dashboard { grid-template-columns: 1fr; }
    .dash-panel.finance-panel,
    .dash-panel.full-width { grid-column: 1; }
    .domain-title { font-size: 32px; }
    .tab-content { padding: 16px; }
    .bottom-bar { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div class="ledger">

  <!-- 헤더 -->
  <div class="title-block">
    <div class="title-label">Domain Ledger · 영지 관리 대장</div>
    <div class="domain-title" id="domainTitle" contenteditable="true" title="클릭하여 영지명 수정">아르카디아 영지</div>
    <div class="header-meta">
      <div class="meta-item">
        <label>영주</label>
        <input type="text" id="lordName" placeholder="이름" value="레온하르트 폰 아르카디아">
      </div>
      <div class="meta-item">
        <label>현재 날짜</label>
        <input type="text" id="currentDate" placeholder="3년 7월 12일" value="건국 3년 7월 12일">
      </div>
      <div class="meta-item">
        <label>영지 등급</label>
        <input type="text" id="domainRank" placeholder="남작령" value="남작령">
      </div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('overview')">📜 현황</button>

<script>
// ──────────────────────────────────────────────
//  데이터 구조
// ──────────────────────────────────────────────
let state = {

  ],
  npcs: [
    { icon:'⚔️', name:'브렌단 그레이', role:'기사단장', stats:'무력 A, 통솔 B', note:'충성심 높음. 부상 회복 중.' },
    { icon:'📜', name:'엘리자 홈즈', role:'영지 서기', stats:'지략 A, 행정 A', note:'재정 관리 담당' },

    { status:'대기', title:'왕국 세금 납부', date:'3년 7월 26일', desc:'3,000골드 납부 필요', reward:'제때 납부 시 신뢰도 유지' },

    { date:'3년 7월 12일 (세션 3)', notes:'단야장 건설 착공. 브렌단 기사단장 부상으로 마루스가 임시 경비대장 겸직. 인근 마을에서 기근 소식이 들어옴 — 다음 세션에서 처리 예정.' }

// ──────────────────────────────────────────────
//  탭 전환
// ──────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const tabs = ['overview','resources','buildings','npc','quest','log'];
  const idx = tabs.indexOf(name);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ──────────────────────────────────────────────
//  렌더링
// ──────────────────────────────────────────────
function render() {
  renderResources();
  renderBuildings();
  renderNPCs();
  renderQuests();
  renderLogs();
  renderSpecialNotes();
  renderDashboard();
}

function renderDashboard() {
  // 자원 요약
  const dashRes = document.getElementById('dash-resources');
  if (dashRes) {
    dashRes.innerHTML = state.resources.map(r => `
      <div class="mini-res">
        <span class="mr-icon">${r.icon}</span>
        <span class="mr-name">${r.name}</span>
        <span class="mr-val">${r.value}</span>
      </div>
    `).join('');
  }

  // 건물 현황
  const dashB = document.getElementById('dash-buildings');
  const dashBC = document.getElementById('dash-building-count');
  if (dashB) {
    dashB.innerHTML = state.buildings.map(b => {
      const sc = b.status === '정상' ? 'status-normal'
               : b.status === '건설중' ? 'status-construction'
               : b.status === '손상' || b.status === '파손' ? 'status-damaged'
               : 'status-other';
      return `<div class="mini-building">
        <span class="mb-name">${b.name}</span>
        <span class="mb-level">${b.level}</span>
        <span class="mb-status ${sc}">${b.status}</span>
      </div>`;
    }).join('') || '<div style="font-size:12px;color:var(--ink-light);font-style:italic">등록된 건물 없음</div>';
    if (dashBC) dashBC.textContent = `총 ${state.buildings.length}개`;
  }

  // 인물
  const dashN = document.getElementById('dash-npcs');
  const dashNC = document.getElementById('dash-npc-count');
  if (dashN) {
    dashN.innerHTML = state.npcs.map(n => `
      <div class="mini-npc">
        <div class="mn-icon">${n.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:baseline;gap:6px">
            <span class="mn-name">${n.name}</span>
            <span class="mn-role">${n.role}</span>
          </div>
          <div class="mn-note">${n.note}</div>
        </div>
      </div>
    `).join('') || '<div style="font-size:12px;color:var(--ink-light);font-style:italic">등록된 인물 없음</div>';
    if (dashNC) dashNC.textContent = `총 ${state.npcs.length}명`;
  }

  // 이벤트 (진행중 우선, 최대 5개)
  const dashQ = document.getElementById('dash-quests');
  const dashQC = document.getElementById('dash-quest-count');
  if (dashQ) {
    const sorted = [...state.quests].sort((a,b) => {
      const order = {'진행중':0,'대기':1,'완료':2,'실패':3};
      return (order[a.status]??9) - (order[b.status]??9);
    }).slice(0, 6);
    dashQ.innerHTML = sorted.map(q => `
      <div class="mini-quest">
        <span class="mq-badge mq-${q.status}">${q.status}</span>
        <span class="mq-title">${q.title}</span>
        <span class="mq-date">${q.date}</span>
      </div>
    `).join('') || '<div style="font-size:12px;color:var(--ink-light);font-style:italic">등록된 이벤트 없음</div>';
    const active = state.quests.filter(q => q.status === '진행중').length;
    if (dashQC) dashQC.textContent = `진행중 ${active}건`;
  }
}

function renderResources() {
  const grid = document.getElementById('resourceGrid');
  grid.innerHTML = state.resources.map((r,i) => `
    <div class="resource-card">
      <button class="del-btn" onclick="delItem('resources',${i})">✕</button>
      <span class="res-icon">${r.icon}</span>
      <span class="res-name">${r.name}</span>
      <input class="res-value" type="text" value="${r.value}" onchange="state.resources[${i}].value=this.value; autosave()">
      <span class="res-unit">${r.unit}</span>
    </div>
  `).join('');
}

function renderBuildings() {
  const tbody = document.getElementById('buildingBody');
  tbody.innerHTML = state.buildings.map((b,i) => `
    <tr>
      <td contenteditable="true" oninput="state.buildings[${i}].name=this.innerText;autosave()">${b.name}</td>
      <td contenteditable="true" oninput="state.buildings[${i}].level=this.innerText;autosave()">${b.level}</td>
      <td contenteditable="true" oninput="state.buildings[${i}].status=this.innerText;autosave()">${b.status}</td>
      <td contenteditable="true" oninput="state.buildings[${i}].note=this.innerText;autosave()">${b.note}</td>
      <td><button class="table-del" onclick="delItem('buildings',${i})">✕</button></td>
    </tr>
  `).join('');
}

function renderNPCs() {
  const tbody = document.getElementById('npcBody');

    <tr>
      <td><div class="npc-portrait" contenteditable="true" oninput="state.npcs[${i}].icon=this.innerText;autosave()">${n.icon}</div></td>
      <td contenteditable="true" oninput="state.npcs[${i}].name=this.innerText;autosave()">${n.name}</td>
      <td contenteditable="true" oninput="state.npcs[${i}].role=this.innerText;autosave()">${n.role}</td>
      <td contenteditable="true" oninput="state.npcs[${i}].stats=this.innerText;autosave()">${n.stats}</td>
      <td contenteditable="true" oninput="state.npcs[${i}].note=this.innerText;autosave()">${n.note}</td>
      <td><button class="table-del" onclick="delItem('npcs',${i})">✕</button></td>
    </tr>
  `).join('');

const questColors = { '진행중':'#c8960c', '완료':'#2e6b2e', '대기':'#5a5a5a', '실패':'#8b1a1a' };

function renderQuests() {
  const tbody = document.getElementById('questBody');
  tbody.innerHTML = state.quests.map((q,i) => `
    <tr>
      <td>
        <select onchange="state.quests[${i}].status=this.value;autosave();renderQuests()" style="background:transparent;border:1px solid ${questColors[q.status]||'#999'};color:${questColors[q.status]||'#999'};font-size:11px;padding:2px 4px;font-family:inherit;outline:none">
          ${['진행중','완료','대기','실패'].map(s=>`<option${s===q.status?' selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td contenteditable="true" oninput="state.quests[${i}].title=this.innerText;autosave()" style="font-weight:600">${q.title}</td>
      <td contenteditable="true" oninput="state.quests[${i}].date=this.innerText;autosave()" style="white-space:nowrap">${q.date}</td>
      <td contenteditable="true" oninput="state.quests[${i}].desc=this.innerText;autosave()">${q.desc}</td>
      <td contenteditable="true" oninput="state.quests[${i}].reward=this.innerText;autosave()">${q.reward}</td>
      <td><button class="table-del" onclick="delItem('quests',${i})">✕</button></td>
    </tr>
  `).join('');
}

function renderLogs() {
  const list = document.getElementById('logList');
  list.innerHTML = state.logs.map((l,i) => `
    <div class="log-entry">
      <div class="log-header">
        <span class="log-tag">날짜</span>
        <input class="log-date-input" type="text" value="${l.date}" onchange="state.logs[${i}].date=this.value;autosave()" placeholder="3년 7월 12일 (세션 X)">
        <button class="log-del" onclick="delItem('logs',${i})">✕</button>
      </div>
      <div class="log-body">
        <textarea class="log-notes" onchange="state.logs[${i}].notes=this.value;autosave()" placeholder="이번 세션에서 일어난 일을 기록하세요...">${l.notes}</textarea>
      </div>
    </div>

function renderSpecialNotes() {
  const el = document.getElementById('specialNotes');
  if (!el) return;
  el.innerHTML = state.specialNotes.map((n,i) => `
    <div class="special-note-wrap">
      <div class="special-note" contenteditable="true"
        oninput="state.specialNotes[${i}]=this.innerText;autosave()"
      >${n}</div>
      <button class="special-note-del" onclick="delSpecialNote(${i})" title="삭제">✕</button>
    </div>
  `).join('');
}

function delSpecialNote(idx) {
  state.specialNotes.splice(idx, 1);
  renderSpecialNotes();
  autosave();
}

// ──────────────────────────────────────────────
//  추가 / 삭제
// ──────────────────────────────────────────────
function delItem(arr, idx) {
  if (!confirm('삭제하시겠습니까?')) return;
  state[arr].splice(idx, 1);
  render();
  autosave();
}

function addSpecialNote() {
  state.specialNotes.push('※ ');
  renderSpecialNotes();
  const notes = document.querySelectorAll('.special-note');
  const last = notes[notes.length-1];
  if (last) { last.focus(); placeCaretAtEnd(last); }
  autosave();
}

function placeCaretAtEnd(el) {
  const range = document.createRange();
  const sel = window.getSelection();
  range.selectNodeContents(el);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
}

function addBuilding() {
  state.buildings.push({ name:'새 건물', level:'1등급', status:'건설중', note:'' });
  renderBuildings();
  renderDashboard();
  autosave();
}

function addNPC() {
  state.npcs.push({ icon:'👤', name:'이름', role:'직책', stats:'—', note:'' });
  renderNPCs();
  renderDashboard();
  autosave();
}

function addQuest() {
  state.quests.push({ status:'대기', title:'새 이벤트', date: state.currentDate, desc:'', reward:'' });
  renderQuests();
  renderDashboard();
  autosave();
}

function addLog() {
  state.logs.unshift({ date: state.currentDate + ' (세션 N)', notes:'' });
  renderLogs();
  autosave();
}

// ──────────────────────────────────────────────
//  자원 모달
// ──────────────────────────────────────────────
function openModal(type) {
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function confirmAddResource() {
  const icon = document.getElementById('mIcon').value || '📦';
  const name = document.getElementById('mName').value || '자원';
  const unit = document.getElementById('mUnit').value || '';
  const value = document.getElementById('mValue').value || '0';
  state.resources.push({ icon, name, unit, value });
  renderResources();
  autosave();
  closeModal();
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ══════════════════════════════════════════════
//  🔥 FIREBASE 설정 — 여기만 본인 값으로 교체하세요
// ══════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAO-zMbqf448r9vytYidCAPBXdxvYXmSpg",
  authDomain:        "foxtail-309da.firebaseapp.com",
  projectId:         "foxtail-309da",
  storageBucket:     "foxtail-309da.firebasestorage.app",
  messagingSenderId: "406019218260",
  appId:             "1:406019218260:web:c85ba09d6a0f4b19b286c1"
};

// Firestore에서 사용할 문서 ID (영지 하나당 하나)
const DOMAIN_DOC_ID = "arcadia"; // 원하는 이름으로 바꿔도 됩니다

// ──────────────────────────────────────────────
//  Firebase 초기화
// ──────────────────────────────────────────────
let db = null;
let unsubscribe = null;
let isSyncing = false;

async function initFirebase() {
  const configured = FIREBASE_CONFIG.apiKey !== "여기에_apiKey_입력";
  if (!configured) {
    setStatus('🔴 Firebase 미설정 — 아래 세팅 가이드 참고', 'error');
    // Firebase 없이도 localStorage로 동작하도록 폴백
    loadFromLocal();
    return;
  }

  try {
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getFirestore, doc, setDoc, onSnapshot, serverTimestamp }
      = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');

    const app = initializeApp(FIREBASE_CONFIG);
    db = getFirestore(app);

    setStatus('🟡 Firebase 연결 중...', 'info');

    // 실시간 리스너 — 다른 사람이 수정하면 자동 반영
    const docRef = doc(db, 'domains', DOMAIN_DOC_ID);
    let firstLoad = true;
    unsubscribe = onSnapshot(docRef, (snap) => {
      if (!snap.exists()) {
        // 문서가 없으면 현재 state를 최초 저장
        pushToFirebase();
        return;
      }
      const remote = snap.data();
      const remoteTime = remote._updatedAt ?? 0;
      const localTime  = state._updatedAt ?? 0;

      // 첫 로드이거나, 원격이 더 최신이고 내가 저장 중이 아닐 때 덮어쓰기
      if (firstLoad || (!isSyncing && remoteTime > localTime)) {
        firstLoad = false;
        state = remote;
        applyHeaderFields();
        render();
        const t = new Date(remoteTime);
        setStatus(`🟢 불러오기 완료 — ${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`, 'ok');
        setSync(firstLoad ? '' : '다른 사용자가 수정했습니다');
      } else if (isSyncing) {
        firstLoad = false;
        setStatus(`🟢 저장 완료`, 'ok');
        setSync('');
      } else {
        firstLoad = false;
      }
    }, (err) => {
      console.error(err);
      setStatus('🔴 Firebase 오류 — 콘솔 확인', 'error');
    });

    setStatus('🟢 Firebase 연결됨 — 실시간 동기화 활성', 'ok');

  } catch(e) {
    console.error(e);
    setStatus('🔴 Firebase 로드 실패 — localhost에선 CORS 오류 날 수 있음', 'error');
    loadFromLocal();
  }
}

async function pushToFirebase() {
  if (!db) { saveToLocal(); return; }
  try {
    isSyncing = true;
    collectHeaderFields();
    const { getFirestore, doc, setDoc, serverTimestamp }
      = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const docRef = doc(db, 'domains', DOMAIN_DOC_ID);
    const payload = { ...state, _updatedAt: Date.now() };
    state._updatedAt = payload._updatedAt;
    await setDoc(docRef, payload);
    setStatus(`🟢 저장됨`, 'ok');
  } catch(e) {
    console.error(e);
    setStatus('🔴 저장 실패 — 네트워크 확인', 'error');
  } finally {
    setTimeout(() => { isSyncing = false; }, 500);
  }
  // 로컬 백업도 병행
  localStorage.setItem('domainLedger', JSON.stringify(state));
}

function setStatus(msg, type) {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = type === 'error' ? 'var(--red-ink)'
                 : type === 'ok'    ? '#3a7a3a'
                 : 'var(--gold)';
}

function setSync(msg) {
  const el = document.getElementById('syncIndicator');
  if (el) el.textContent = msg;
}

// ──────────────────────────────────────────────
//  저장 / 불러오기
// ──────────────────────────────────────────────
function collectHeaderFields() {
  state.domainTitle  = document.getElementById('domainTitle').innerText;
  state.lordName     = document.getElementById('lordName').value;
  state.currentDate  = document.getElementById('currentDate').value;
  state.domainRank   = document.getElementById('domainRank').value;
  state.totalAsset   = document.getElementById('totalAsset').value;
  state.totalDebt    = document.getElementById('totalDebt').value;
  state.monthIncome  = document.getElementById('monthIncome').value;
  state.monthExpense = document.getElementById('monthExpense').value;
}

function applyHeaderFields() {
  document.getElementById('domainTitle').innerText  = state.domainTitle  ?? '';
  document.getElementById('lordName').value         = state.lordName     ?? '';
  document.getElementById('currentDate').value      = state.currentDate  ?? '';
  document.getElementById('domainRank').value       = state.domainRank   ?? '';
  document.getElementById('totalAsset').value       = state.totalAsset   ?? '';
  document.getElementById('totalDebt').value        = state.totalDebt    ?? '';
  document.getElementById('monthIncome').value      = state.monthIncome  ?? '';
  document.getElementById('monthExpense').value     = state.monthExpense ?? '';
}

// autosave → Firebase push (디바운스 1.5초)
let autosaveTimer;
function autosave() {
  clearTimeout(autosaveTimer);
  setSync('입력 중...');
  autosaveTimer = setTimeout(() => pushToFirebase(), 1500);
}

// Firebase 없을 때 로컬 폴백
function saveToLocal() {
  collectHeaderFields();
  localStorage.setItem('domainLedger', JSON.stringify(state));
  const now = new Date();
  setStatus(`💾 로컬 저장 — ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`, 'info');
}

function loadFromLocal() {
  const saved = localStorage.getItem('domainLedger');
  if (saved) {
    try {
      state = JSON.parse(saved);
      applyHeaderFields();
      setSync('로컬 데이터 복원됨');
    } catch {}
  }
  render();
}

// JSON 백업 다운로드 (Firebase 유무와 무관하게 항상 사용 가능)
function saveToFile() {
  collectHeaderFields();
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${state.domainTitle}_${state.currentDate.replace(/\s/g,'_')}.json`;
  a.click();
}

function loadFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      state = JSON.parse(e.target.result);
      applyHeaderFields();
      render();
      // Firebase에도 올리기
      pushToFirebase();
      setSync(`"${file.name}" 불러와서 Firebase에 업로드 완료`);
    } catch {
      alert('파일 형식이 올바르지 않습니다.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ──────────────────────────────────────────────
//  헤더 필드 자동저장 연결
// ──────────────────────────────────────────────
['lordName','currentDate','domainRank','totalAsset','totalDebt','monthIncome','monthExpense'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => autosave());
});
document.getElementById('domainTitle').addEventListener('input', () => autosave());

// ──────────────────────────────────────────────
//  초기 로드
// ──────────────────────────────────────────────
window.addEventListener('load', () => {
  render();
  initFirebase();
});
</script>
